<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name&Age</title>
</head>
<style>
  table, td {
    text-align: center;
  }
</style>

<body>
  <div>
    <table width="20%">
      <tbody>
        <tr>
          <td><label for="newName">Name:</label></td>
          <td><input type="text" id="newName"></td>
        </tr>
        <tr>
          <td><label for="newAge">Age:</label></td>
          <td><input type="number" id="newAge"></td>
        </tr>
      </tbody>
    </table>
  </div><br>

  <button onclick="updateTable()">Add</button>

  <p>&nbsp;</p>

  <table width="40%" border="1" cellpadding="5" cellspacing="0" id="mytable">
    <tr>
      <th>No.</th>
      <th>Name</th>
      <th>Age</th>
    </tr>
  </table>
  <script>
    var rowCount = 1;

    function updateTable() {
      var newName = document.getElementById("newName").value;
      var newAge = document.getElementById("newAge").value;

      if (newName && newAge) {
        var table = document.getElementById("mytable");
        var newRow = table.insertRow();
        var num_insert = newRow.insertCell(0);
        var name_insert = newRow.insertCell(1);
        var age_insert = newRow.insertCell(2);


        num_insert.innerHTML = rowCount++;
        name_insert.innerHTML = newName;
        age_insert.innerHTML = newAge;

        document.getElementById("newName").value = "";
        document.getElementById("newAge").value = "";
      } else {
        alert("Enter Name and Age.")
      }
    }
  </script>
</body>
</html>
